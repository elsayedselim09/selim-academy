<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>أكاديمية سليم | داشبورد دينامك</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="container">
    <section id="auth-card" class="card auth">
      <h1>دخول الطالب</h1>
      <p class="muted">تسجيل الدخول من Supabase</p>
      <form id="auth-form">
        <input id="email" type="email" placeholder="البريد الإلكتروني" required>
        <input id="password" type="password" placeholder="كلمة المرور" required>
        <button type="submit">دخول</button>
      </form>
      <button id="signup-btn" class="secondary">إنشاء حساب جديد</button>
      <p id="auth-msg" class="status"></p>
    </section>

    <section id="dashboard" class="hidden">
      <header class="topbar card">
        <div>
          <h2 id="welcome">أهلا بك</h2>
          <p class="muted">بيانات مباشرة من Supabase</p>
        </div>
        <div class="actions">
          <button id="seed-btn" class="secondary">تهيئة بيانات تجريبية</button>
          <button id="logout-btn">خروج</button>
        </div>
      </header>

      <section class="grid stats">
        <article class="card"><h3 id="stat-courses">0</h3><p>كورساتي</p></article>
        <article class="card"><h3 id="stat-sessions">0</h3><p>حصص قادمة</p></article>
        <article class="card"><h3 id="stat-progress">0%</h3><p>متوسط التقدم</p></article>
        <article class="card"><h3 id="stat-notifs">0</h3><p>إشعارات غير مقروءة</p></article>
      </section>

      <section class="grid two-cols">
        <article class="card">
          <h3>كورساتي</h3>
          <div id="courses-list" class="list"></div>
        </article>
        <article class="card">
          <h3>الحصص القادمة</h3>
          <div id="sessions-list" class="list"></div>
        </article>
      </section>

      <section class="grid two-cols">
        <article class="card">
          <h3>الإشعارات</h3>
          <div id="notifications-list" class="list"></div>
        </article>
        <article class="card">
          <h3>الاشتراك</h3>
          <div id="subscription-box" class="list"></div>
        </article>
      </section>

      <section class="card">
        <h3>الإعدادات الشخصية</h3>
        <form id="profile-form" class="profile-form">
          <input id="full-name" type="text" placeholder="الاسم بالكامل">
          <input id="phone" type="text" placeholder="رقم الهاتف">
          <button type="submit">حفظ التغييرات</button>
        </form>
        <p id="profile-msg" class="status"></p>
      </section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
