<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أكاديمية سليم | لوحة التحكم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<!-- Supabase SDK من CDN — لا يحتاج npm -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:.4} }
@keyframes spin   { to{transform:rotate(360deg)} }
:root{
  --blue:#1A56DB;--blue-dark:#1342B0;--blue-light:#EBF5FF;--blue-mid:#3B82F6;
  --green:#0E9F6E;--green-light:#ECFDF5;
  --gold:#F59E0B;--gold-light:#FFFBEB;
  --red:#EF4444;--red-light:#FEF2F2;
  --purple:#8B5CF6;--purple-light:#F5F3FF;
  --dark:#111928;--gray:#6B7280;--gray-light:#F9FAFB;--gray-mid:#E5E7EB;--white:#fff;
  --sidebar-w:260px;--header-h:64px;--radius:12px;
  --shadow:0 2px 12px rgba(0,0,0,.07);--shadow-lg:0 8px 32px rgba(0,0,0,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:var(--gray-light);color:var(--dark);direction:rtl;overflow-x:hidden}

/* ── AUTH SCREEN ── */
#auth-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--gray-light);padding:20px;
}
.auth-card{
  background:#fff;border-radius:16px;border:1px solid var(--gray-mid);
  padding:40px 36px;width:100%;max-width:440px;
  box-shadow:0 4px 24px rgba(0,0,0,.07);animation:fadeIn .3s ease;
}
.auth-logo{
  width:52px;height:52px;background:var(--blue);border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:1.1rem;font-weight:900;margin:0 auto 14px;
}
.auth-title{font-size:1.3rem;font-weight:900;color:var(--dark);margin:0 0 4px;text-align:center}
.auth-sub{font-size:.85rem;color:var(--gray);margin:0 0 28px;text-align:center}
.auth-form{display:flex;flex-direction:column;gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:.82rem;font-weight:700;color:var(--dark)}
.form-group input{
  width:100%;background:var(--gray-light);border:1.5px solid var(--gray-mid);
  border-radius:9px;padding:11px 14px;font-family:'Cairo',sans-serif;
  font-size:.9rem;color:var(--dark);outline:none;transition:border-color .2s;
}
.form-group input:focus{border-color:var(--blue)}
.form-group input[type=email],.form-group input[type=password]{direction:ltr}
.btn-auth{
  width:100%;padding:12px;background:var(--blue);color:#fff;border:none;
  border-radius:9px;font-family:'Cairo',sans-serif;font-size:.95rem;font-weight:700;
  cursor:pointer;transition:background .2s;
}
.btn-auth:hover{background:var(--blue-dark)}
.btn-auth:disabled{opacity:.7;cursor:not-allowed}
.auth-link{color:var(--blue);font-weight:700;text-decoration:none;font-size:.85rem;cursor:pointer}
.auth-err{
  background:var(--red-light);border:1px solid #FECACA;border-radius:8px;
  padding:10px 14px;font-size:.85rem;color:var(--red);display:flex;align-items:center;gap:8px;
}
.auth-ok{
  background:var(--green-light);border:1px solid #6EE7B7;border-radius:8px;
  padding:10px 14px;font-size:.85rem;color:var(--green);display:flex;align-items:center;gap:8px;
}
.auth-tabs{display:flex;gap:0;margin-bottom:24px;border:1px solid var(--gray-mid);border-radius:10px;overflow:hidden}
.auth-tab{
  flex:1;padding:10px;background:none;border:none;font-family:'Cairo',sans-serif;
  font-size:.88rem;font-weight:700;cursor:pointer;color:var(--gray);transition:all .2s;
}
.auth-tab.active{background:var(--blue);color:#fff}

/* ── LOADER ── */
#loader{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;background:var(--gray-light);
}
.spinner{
  width:36px;height:36px;border:3px solid var(--gray-mid);
  border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;
}

/* ── DASHBOARD ── */
#dashboard-screen{display:none}
.sidebar{
  position:fixed;top:0;right:0;width:var(--sidebar-w);height:100vh;
  background:var(--dark);display:flex;flex-direction:column;z-index:100;transition:transform .3s;
}
.sidebar-logo{
  padding:20px 22px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid rgba(255,255,255,.08);text-decoration:none;
}
.logo-icon{width:38px;height:38px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.9rem;font-weight:900;flex-shrink:0}
.logo-text{font-size:1.05rem;font-weight:900;color:#fff;line-height:1.2}
.logo-sub{font-size:.7rem;color:rgba(255,255,255,.4)}
.sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto}
.nav-label{font-size:.68rem;color:rgba(255,255,255,.3);font-weight:700;letter-spacing:.8px;padding:12px 10px 6px;text-transform:uppercase}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:10px;
  color:rgba(255,255,255,.55);font-size:.9rem;font-weight:600;cursor:pointer;
  transition:all .2s;margin-bottom:2px;border:none;background:none;width:100%;
  font-family:'Cairo',sans-serif;text-align:right;
}
.nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.9)}
.nav-item.active{background:var(--blue);color:#fff;box-shadow:0 4px 14px rgba(26,86,219,.4)}
.nav-icon{font-size:1.1rem;width:22px;text-align:center;flex-shrink:0}
.nav-badge{margin-right:auto;background:var(--red);color:#fff;font-size:.65rem;font-weight:900;padding:2px 7px;border-radius:50px}
.sidebar-bottom{padding:16px 12px;border-top:1px solid rgba(255,255,255,.08)}
.user-mini{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px}
.user-av-sm{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blue-mid));display:flex;align-items:center;justify-content:center;color:#fff;font-size:.85rem;font-weight:900;flex-shrink:0}
.user-mini-name{font-size:.85rem;font-weight:700;color:#fff}
.user-mini-role{font-size:.72rem;color:rgba(255,255,255,.4)}
.main-header{
  position:fixed;top:0;left:0;width:calc(100% - var(--sidebar-w));height:var(--header-h);
  background:var(--white);border-bottom:1px solid var(--gray-mid);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;z-index:99;box-shadow:var(--shadow);
}
.header-right{display:flex;align-items:center;gap:12px}
.header-welcome{font-size:.95rem;font-weight:700;color:var(--dark)}
.header-welcome span{color:var(--blue)}
.hamburger{display:none;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--dark)}
.header-left{display:flex;align-items:center;gap:12px;position:relative}
.notif-btn{
  position:relative;width:38px;height:38px;border-radius:50%;
  background:var(--gray-light);border:1px solid var(--gray-mid);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:1.1rem;transition:all .2s;user-select:none;
}
.notif-btn:hover{background:var(--blue-light);border-color:var(--blue)}
.notif-dot{position:absolute;top:4px;left:4px;width:9px;height:9px;background:var(--red);border-radius:50%;border:2px solid #fff}
.header-user{display:flex;align-items:center;gap:9px;cursor:pointer;padding:5px 10px;border-radius:50px;border:1px solid var(--gray-mid);transition:all .2s}
.header-user:hover{background:var(--gray-light)}
.header-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blue-mid));display:flex;align-items:center;justify-content:center;color:#fff;font-size:.82rem;font-weight:900}
.btn-logout{
  padding:7px 16px;background:var(--red-light);color:var(--red);
  border:1px solid #FECACA;border-radius:8px;font-family:'Cairo',sans-serif;
  font-size:.82rem;font-weight:700;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;gap:6px;
}
.btn-logout:hover{background:var(--red);color:#fff}
.notif-panel{
  position:absolute;top:52px;left:20px;width:320px;background:var(--white);
  border:1px solid var(--gray-mid);border-radius:14px;
  box-shadow:var(--shadow-lg);z-index:200;overflow:hidden;animation:fadeIn .2s ease;
}
.notif-head{padding:14px 18px;border-bottom:1px solid var(--gray-mid);font-size:.9rem;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.notif-item{padding:12px 18px;border-bottom:1px solid var(--gray-mid);display:flex;gap:12px;align-items:flex-start;cursor:pointer;transition:background .2s}
.notif-item:hover{background:var(--gray-light)}
.notif-item:last-child{border-bottom:none}
.main-content{margin-right:var(--sidebar-w);margin-top:var(--header-h);padding:28px;min-height:calc(100vh - var(--header-h))}
.page{display:none;animation:fadeIn .3s ease}
.page.active{display:block}
.page-title{font-size:1.4rem;font-weight:900;color:var(--dark);margin-bottom:4px}
.page-sub{font-size:.88rem;color:var(--gray);margin-bottom:28px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:28px}
.stat-card{background:var(--white);border:1px solid var(--gray-mid);border-radius:var(--radius);padding:22px;display:flex;align-items:flex-start;gap:16px;transition:all .25s}
.stat-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.stat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.stat-icon.blue{background:var(--blue-light)}.stat-icon.green{background:var(--green-light)}.stat-icon.gold{background:var(--gold-light)}.stat-icon.purple{background:var(--purple-light)}
.stat-num{font-size:1.8rem;font-weight:900;color:var(--dark);line-height:1}
.stat-label{font-size:.8rem;color:var(--gray);margin-top:3px}
.stat-delta{font-size:.74rem;font-weight:700;margin-top:6px;display:inline-flex;align-items:center;gap:3px}
.delta-up{color:var(--green)}.delta-down{color:var(--red)}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.section-card{background:var(--white);border:1px solid var(--gray-mid);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
.section-head{padding:18px 22px;border-bottom:1px solid var(--gray-mid);display:flex;align-items:center;justify-content:space-between}
.section-head h3{font-size:1rem;font-weight:900;color:var(--dark)}
.section-body{padding:20px 22px}
.see-all{font-size:.8rem;color:var(--blue);font-weight:700;cursor:pointer}
.session-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--gray-mid)}
.session-item:last-child{border-bottom:none;padding-bottom:0}
.session-time-box{background:var(--blue-light);border:1px solid rgba(26,86,219,.15);border-radius:10px;padding:8px 12px;text-align:center;flex-shrink:0;min-width:62px}
.session-day{font-size:.68rem;color:var(--blue);font-weight:700}
.session-hour{font-size:.95rem;font-weight:900;color:var(--blue);line-height:1}
.session-info{flex:1}
.session-subj{font-size:.9rem;font-weight:700;color:var(--dark);margin-bottom:2px}
.session-teacher{font-size:.78rem;color:var(--gray)}
.countdown{font-size:.72rem;color:var(--gold);font-weight:700;margin-top:2px}
.btn-join{padding:7px 14px;border-radius:8px;font-family:'Cairo',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;border:none;transition:all .2s;flex-shrink:0}
.btn-live{background:var(--green);color:#fff}.btn-live:hover{background:#0B8A5F}
.btn-soon{background:#FEF3C7;color:#92400E;border:1px solid #FCD34D}
.btn-dis{background:var(--gray-light);color:var(--gray);cursor:not-allowed;border:1px solid var(--gray-mid)}
.btn-end{background:var(--red-light);color:var(--red);border:1px solid #FECACA;cursor:not-allowed}
.courses-list{display:flex;flex-direction:column;gap:14px}
.course-item{display:flex;align-items:center;gap:14px;padding:14px;border:1px solid var(--gray-mid);border-radius:10px;transition:all .2s;cursor:pointer}
.course-item:hover{border-color:var(--blue);box-shadow:var(--shadow)}
.course-thumb{width:52px;height:52px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0}
.course-info{flex:1}
.course-name{font-size:.9rem;font-weight:700;color:var(--dark);margin-bottom:4px}
.course-meta{font-size:.75rem;color:var(--gray);margin-bottom:8px}
.pw{display:flex;align-items:center;gap:10px}
.pb{flex:1;height:6px;background:var(--gray-mid);border-radius:50px;overflow:hidden}
.pf{height:100%;border-radius:50px;transition:width .8s ease}
.pp{font-size:.75rem;font-weight:700;flex-shrink:0}
.btn-continue{padding:7px 14px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-family:'Cairo',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;flex-shrink:0}
.activity-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--gray-mid)}
.activity-item:last-child{border-bottom:none}
.activity-dot{width:10px;height:10px;border-radius:50%;margin-top:5px;flex-shrink:0}
.dot-blue{background:var(--blue)}.dot-green{background:var(--green)}.dot-gold{background:var(--gold)}
.activity-text{font-size:.85rem;color:var(--dark);line-height:1.5}
.activity-time{font-size:.74rem;color:var(--gray);margin-top:2px}
.progress-stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.progress-stat{background:var(--white);border:1px solid var(--gray-mid);border-radius:var(--radius);padding:24px;text-align:center}
.big-num{font-size:2.4rem;font-weight:900;color:var(--blue);line-height:1;margin-bottom:4px}
.big-label{font-size:.85rem;color:var(--gray)}
.pcrow{display:flex;align-items:center;gap:14px;padding:16px 0;border-bottom:1px solid var(--gray-mid)}
.pcrow:last-child{border-bottom:none}
.pc-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.sub-card{background:linear-gradient(135deg,var(--blue),var(--blue-dark));border-radius:20px;padding:32px;color:#fff;margin-bottom:24px;position:relative;overflow:hidden}
.sub-card::before{content:'';position:absolute;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.07);top:-60px;left:-40px}
.sub-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.2);border-radius:50px;padding:4px 14px;font-size:.78rem;font-weight:700;margin-bottom:14px}
.sub-plan{font-size:1.6rem;font-weight:900;margin-bottom:6px}
.sub-exp{font-size:.88rem;opacity:.8;margin-bottom:20px}
.btn-renew{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:var(--gold);color:#fff;border:none;border-radius:10px;font-family:'Cairo',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;margin-top:20px;transition:all .25s}
.btn-renew:hover{background:#D97706;transform:translateY(-1px)}
.detail-row{display:flex;justify-content:space-between;padding:12px;background:var(--gray-light);border-radius:9px;margin-bottom:10px}
.settings-section{background:var(--white);border:1px solid var(--gray-mid);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
.settings-head{padding:16px 22px;border-bottom:1px solid var(--gray-mid);font-size:.92rem;font-weight:700;color:var(--dark);background:var(--gray-light)}
.settings-body{padding:22px}
.settings-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.settings-group{display:flex;flex-direction:column;gap:7px}
.settings-group label{font-size:.8rem;font-weight:700;color:var(--dark)}
.settings-group input,.settings-group textarea{
  width:100%;background:var(--gray-light);border:1.5px solid var(--gray-mid);
  border-radius:9px;padding:11px 14px;font-family:'Cairo',sans-serif;
  font-size:.9rem;color:var(--dark);outline:none;transition:border-color .2s;direction:rtl;resize:none;
}
.settings-group input:focus,.settings-group textarea:focus{border-color:var(--blue)}
.btn-save{padding:11px 28px;background:var(--blue);color:#fff;border:none;border-radius:9px;font-family:'Cairo',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .25s;margin-top:6px}
.btn-save:hover{background:var(--blue-dark)}
.btn-save:disabled{opacity:.7;cursor:not-allowed}
.support-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:24px}
.support-card{background:var(--white);border:1px solid var(--gray-mid);border-radius:var(--radius);padding:24px;text-align:center;cursor:pointer;transition:all .25s}
.support-card:hover{border-color:var(--blue);transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
.overlay.show{display:block}
.skel{background:var(--gray-mid);border-radius:8px;animation:pulse 1.5s ease-in-out infinite;display:block}
.toast-ok{background:var(--green-light);border:1px solid #6EE7B7;color:var(--green);padding:12px 18px;border-radius:10px;font-size:.88rem;font-weight:600;margin-top:12px;display:flex;align-items:center;gap:8px}
.toast-err{background:var(--red-light);border:1px solid #FECACA;color:var(--red);padding:12px 18px;border-radius:10px;font-size:.88rem;font-weight:600;margin-top:12px;display:flex;align-items:center;gap:8px}
.empty-box{text-align:center;padding:40px 20px}
.empty-box .ei{font-size:2.5rem;margin-bottom:12px}
.empty-box .et{font-weight:700;color:var(--dark);margin-bottom:4px}
.empty-box .ed{font-size:.82rem;color:var(--gray)}
.err-box{background:var(--red-light);border:1px solid #FECACA;border-radius:10px;padding:14px 18px;color:var(--red);font-size:.85rem}
@media(max-width:900px){
  .sidebar{transform:translateX(100%)}.sidebar.open{transform:translateX(0)}
  .main-content{margin-right:0}.main-header{width:100%}.hamburger{display:flex}
  .stats-grid{grid-template-columns:repeat(2,1fr)}.dash-grid{grid-template-columns:1fr}
  .progress-stat-grid{grid-template-columns:1fr 1fr}.support-grid{grid-template-columns:1fr}
  .settings-row{grid-template-columns:1fr}
}
@media(max-width:520px){
  .stats-grid{grid-template-columns:1fr 1fr}.main-content{padding:16px}
  .main-header{padding:0 16px}
}
</style>
</head>
<body>

<!-- ══ LOADER ══ -->
<div id="loader">
  <div style="font-size:2.5rem">📚</div>
  <div class="spinner"></div>
  <p style="color:var(--gray);font-family:Cairo,sans-serif;font-size:.9rem">جاري التحميل...</p>
</div>

<!-- ══ AUTH ══ -->
<div id="auth-screen" style="display:none">
  <div class="auth-card">
    <div class="auth-logo">أس</div>
    <h1 class="auth-title" id="auth-title">تسجيل الدخول</h1>
    <p class="auth-sub" id="auth-sub">أهلاً بك في أكاديمية سليم 👋</p>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">تسجيل الدخول</button>
      <button class="auth-tab" onclick="switchTab('signup')">حساب جديد</button>
    </div>
    <div id="auth-msg"></div>

    <!-- Login form -->
    <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" id="login-email" placeholder="example@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" id="login-pw" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <div style="text-align:left">
        <span class="auth-link" onclick="switchTab('forgot')">نسيت كلمة المرور؟</span>
      </div>
      <button type="submit" class="btn-auth" id="login-btn">تسجيل الدخول</button>
    </form>

    <!-- Signup form -->
    <form id="signup-form" class="auth-form" style="display:none" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label>الاسم الكامل</label>
        <input type="text" id="signup-name" placeholder="محمد أحمد" required autocomplete="name" style="direction:rtl">
      </div>
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" id="signup-email" placeholder="example@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" id="signup-pw" placeholder="8 أحرف على الأقل" required autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>تأكيد كلمة المرور</label>

const sb = createClient(

// ══════════════════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════════════════
function initials(name) {
  if (!name) return '؟';
  const p = name.trim().split(' ');
  return p.length === 1 ? p[0][0] : (p[0][0] || '') + (p[1][0] || '');
}
function timeAgo(iso) {
  const d = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (d < 1) return 'الآن';
  if (d < 60) return `منذ ${d} دقيقة`;
  if (d < 1440) return `منذ ${Math.floor(d/60)} ساعة`;
  if (d < 2880) return 'أمس';
  return `منذ ${Math.floor(d/1440)} أيام`;
}
function formatDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('ar-EG', { year:'numeric', month:'long', day:'numeric' });
}
function formatTime(iso) {
  return new Date(iso).toLocaleTimeString('ar-EG', { hour:'2-digit', minute:'2-digit' });
}
function dayLabel(iso) {
  const diff = Math.round((new Date(new Date(iso).setHours(0,0,0,0)) - new Date(new Date().setHours(0,0,0,0))) / 86400000);
  if (diff === 0) return 'اليوم';
  if (diff === -1) return 'أمس';
  if (diff === 1) return 'غداً';
  return new Date(iso).toLocaleDateString('ar-EG', { weekday:'short' });
}
function daysLeft(iso) {
  if (!iso) return 0;
  return Math.max(0, Math.ceil((new Date(iso) - Date.now()) / 86400000));
}
function sessionStatus(s) {
  if (s.status === 'ended') return 'ended';
  const diff = (new Date(s.scheduled_at) - Date.now()) / 60000;
  if (s.status === 'live' || (diff >= -90 && diff <= 0)) return 'live';
  if (diff > 0 && diff <= 30) return 'soon';
  if (new Date(s.scheduled_at) < Date.now()) return 'ended';
  return 'upcoming';
}
function pgGradient(p) {
  if (p >= 70) return 'linear-gradient(90deg,#1A56DB,#3B82F6)';
  if (p >= 40) return 'linear-gradient(90deg,#F59E0B,#FCD34D)';
  return 'linear-gradient(90deg,#8B5CF6,#A78BFA)';
}
function pgColor(p) {
  if (p >= 70) return '#1A56DB';
  if (p >= 40) return '#F59E0B';
  return '#8B5CF6';
}
function avg(arr) { return arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0; }
function mapAuthErr(msg) {
  if (msg.includes('Invalid login')) return 'البريد أو كلمة المرور غير صحيحة';
  if (msg.includes('Email not confirmed')) return 'يرجى تأكيد بريدك الإلكتروني أولاً';
  if (msg.includes('already registered')) return 'هذا البريد مسجل مسبقاً';
  if (msg.includes('rate limit')) return 'تم تجاوز الحد المسموح به، حاول لاحقاً';
  return 'حدث خطأ، يرجى المحاولة مرة أخرى';
}
function skel(w='100%', h='16px', r='8px', mb='0') {
  return `<span class="skel" style="width:${w};height:${h};border-radius:${r};margin-bottom:${mb};display:block"></span>`;
}

function showMsg(html) { document.getElementById('auth-msg').innerHTML = html; }
function clearMsg()    { document.getElementById('auth-msg').innerHTML = ''; }

function switchTab(tab) {
  clearMsg();
  document.getElementById('login-form').style.display   = 'none';
  document.getElementById('signup-form').style.display  = 'none';
  document.getElementById('forgot-form').style.display  = 'none';
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));

  if (tab === 'login') {
    document.getElementById('login-form').style.display = 'flex';
    document.querySelectorAll('.auth-tab')[0].classList.add('active');
    document.getElementById('auth-title').textContent = 'تسجيل الدخول';
    document.getElementById('auth-sub').textContent   = 'أهلاً بك في أكاديمية سليم 👋';
    document.querySelector('.auth-tabs').style.display = 'flex';
  } else if (tab === 'signup') {
    document.getElementById('signup-form').style.display = 'flex';
    document.querySelectorAll('.auth-tab')[1].classList.add('active');
    document.getElementById('auth-title').textContent = 'إنشاء حساب';
    document.getElementById('auth-sub').textContent   = 'انضم إلى أكاديمية سليم اليوم 🎓';
    document.querySelector('.auth-tabs').style.display = 'flex';
  } else {
    document.getElementById('forgot-form').style.display = 'flex';
    document.getElementById('auth-title').textContent = 'استعادة كلمة المرور';
    document.getElementById('auth-sub').textContent   = 'سنرسل لك رابط إعادة التعيين';
    document.querySelector('.auth-tabs').style.display = 'none';
  }
}

async function handleLogin(e) {
  e.preventDefault(); clearMsg();
  const email = document.getElementById('login-email').value.trim();
  const pw    = document.getElementById('login-pw').value;
  if (!email || !pw) return showMsg('<div class="auth-err">⚠️ يرجى ملء جميع الحقول</div>');
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = '⏳ جاري الدخول...';
  const { error } = await sb.auth.signInWithPassword({ email, password: pw });
  btn.disabled = false; btn.textContent = 'تسجيل الدخول';
  if (error) showMsg(`<div class="auth-err">⚠️ ${mapAuthErr(error.message)}</div>`);
  // onAuthStateChange will handle the rest
}

async function handleSignup(e) {
  e.preventDefault(); clearMsg();
  const name  = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pw    = document.getElementById('signup-pw').value;
  const pw2   = document.getElementById('signup-pw2').value;
  if (!name || !email || !pw) return showMsg('<div class="auth-err">⚠️ يرجى ملء جميع الحقول</div>');
  if (pw.length < 8)           return showMsg('<div class="auth-err">⚠️ كلمة المرور يجب أن تكون 8 أحرف على الأقل</div>');
  if (pw !== pw2)               return showMsg('<div class="auth-err">⚠️ كلمتا المرور غير متطابقتين</div>');
  const btn = document.getElementById('signup-btn');
  btn.disabled = true; btn.textContent = '⏳ جاري الإنشاء...';
  const { error } = await sb.auth.signUp({ email, password: pw, options: { data: { full_name: name } } });
  btn.disabled = false; btn.textContent = 'إنشاء الحساب';
  if (error) showMsg(`<div class="auth-err">⚠️ ${mapAuthErr(error.message)}</div>`);
  else showMsg('<div class="auth-ok">✅ تم إنشاء حسابك! تحقق من بريدك الإلكتروني.</div>');
}

async function handleForgot(e) {
  e.preventDefault(); clearMsg();
  const email = document.getElementById('forgot-email').value.trim();
  if (!email) return;
  const btn = document.getElementById('forgot-btn');
  btn.disabled = true; btn.textContent = '⏳ جاري الإرسال...';
  await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin });
  btn.disabled = false; btn.textContent = 'إرسال رابط الاستعادة';
  showMsg('<div class="auth-ok">✅ إذا كان البريد مسجلاً، ستصلك رسالة قريباً.</div>');
}

async function handleLogout() {
  if (!confirm('هل تريد تسجيل الخروج؟')) return;
  await sb.auth.signOut();
}

      <div class="progress-stat"><div class="big-num">${totalLes}</div><div class="big-label">إجمالي الدروس</div></div>
    </div>
    <div class="section-card">
      <div class="section-head"><h3>تفاصيل التقدم لكل كورس</h3></div>
      <div class="section-body">
        ${enr.length === 0
          ? `<div class="empty-box"><div class="ei">📈</div><div class="et">لا توجد بيانات تقدم</div><div class="ed">انضم لكورس لتبدأ تتبع تقدمك</div></div>`
          : enr.map(e => {
              const p = e.progress_pct||0;
              return `<div class="pcrow">
                <div class="pc-icon" style="background:${e.courses?.icon_bg||'#EBF5FF'}">${e.courses?.icon||'📚'}</div>
                <div style="flex:1">
                  <div style="font-size:.9rem;font-weight:700;color:var(--dark);margin-bottom:6px">${e.courses?.name||'—'}</div>
                  <div style="font-size:.78rem;color:var(--gray);margin-bottom:6px">${e.completed_lessons||0} من ${e.courses?.total_lessons||'?'} درس مكتمل</div>
                  <div class="pw">
                    <div class="pb"><div class="pf" style="width:${p}%;background:${pgGradient(p)}"></div></div>
                    <div class="pp" style="color:${pgColor(p)}">${p}%</div>
                  </div>
                </div>
              </div>`;
            }).join('')}
      </div>
    </div>`;
}

// ── SUBSCRIPTION ─────────────────────────────────────────────────
function subscription() {
  const sub = STATE.subscription;
  if (!sub) return `
    <div class="page-title">الاشتراك 💳</div>
    <p class="page-sub">تفاصيل اشتراكك الحالي</p>
    <div class="empty-box">
      <div class="ei">💳</div>
      <div class="et">لا يوجد اشتراك نشط</div>
      <div class="ed">تواصل معنا لتفعيل اشتراكك</div>
    </div>`;
  const rem = daysLeft(sub.expires_at);
  return `
    <div class="page-title">الاشتراك 💳</div>
    <p class="page-sub">تفاصيل اشتراكك الحالي وخيارات التجديد</p>
    <div class="sub-card">
      <div class="sub-badge">⭐ ${sub.plan_name}</div>
      <div class="sub-plan">${sub.plan_detail} — ${sub.sessions_total} حصة شهرياً</div>
      <div class="sub-exp">تاريخ الانتهاء: ${formatDate(sub.expires_at)}</div>
      <div style="display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.15);border-radius:10px;padding:10px 18px;font-weight:700">
        📅 متبقي ${rem} يوماً على انتهاء الاشتراك
      </div>
      <div>
        <button class="btn-renew" onclick="window.open('https://wa.me/201012142749?text=${encodeURIComponent('أريد تجديد اشتراكي في أكاديمية سليم')}','_blank')">
          🔄 تجديد الاشتراك الآن
        </button>
      </div>
    </div>
    <div class="section-card">
      <div class="section-head"><h3>تفاصيل الاشتراك الحالي</h3></div>
      <div class="section-body">
        ${[
          ['نوع الاشتراك', `${sub.plan_detail} — ${sub.sessions_total} حصة`],
          ['المادة',       sub.subjects||'—'],
          ['تاريخ البدء',  formatDate(sub.starts_at)],
          ['تاريخ الانتهاء', formatDate(sub.expires_at), rem < 7],
          ['الحصص المستهلكة', `${sub.sessions_used} من ${sub.sessions_total}`],
        ].map(([l,v,red]) => `
          <div class="detail-row">
            <span style="font-size:.88rem;color:var(--gray)">${l}</span>
            <span style="font-size:.88rem;font-weight:700${red?';color:var(--red)':''}">${v}</span>
          </div>`).join('')}
      </div>
    </div>`;
}

// ── SETTINGS ─────────────────────────────────────────────────────
function settings() {
  const p = STATE.profile || {};
  return `
    <div class="page-title">الإعدادات ⚙️</div>
    <p class="page-sub">تعديل بياناتك الشخصية وكلمة المرور</p>
    <div class="settings-section">
      <div class="settings-head">البيانات الشخصية</div>
      <div class="settings-body">
        <form id="profile-form">
          <div class="settings-row">
            <div class="settings-group"><label>الاسم الكامل</label><input type="text" id="s-name" value="${p.full_name||''}" placeholder="اسمك الكامل"></div>
            <div class="settings-group"><label>رقم الهاتف</label><input type="tel" id="s-phone" value="${p.phone||''}" placeholder="05XXXXXXXX"></div>
          </div>
          <div class="settings-row">
            <div class="settings-group"><label>المرحلة الدراسية</label><input type="text" id="s-grade" value="${p.grade||''}" placeholder="الثانوية العامة"></div>
          </div>
          <button type="submit" class="btn-save" id="save-btn">💾 حفظ التغييرات</button>
          <div id="save-msg"></div>
        </form>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-head">تغيير كلمة المرور</div>
      <div class="settings-body">
        <form id="pw-form">
          <div class="settings-row">
            <div class="settings-group"><label>كلمة المرور الجديدة</label><input type="password" id="pw-new" placeholder="8 أحرف على الأقل" style="direction:ltr"></div>
            <div class="settings-group"><label>تأكيد كلمة المرور</label><input type="password" id="pw-confirm" placeholder="أعد الكتابة" style="direction:ltr"></div>
          </div>
          <button type="submit" class="btn-save" id="pw-btn">🔒 تغيير كلمة المرور</button>
          <div id="pw-msg"></div>
        </form>
      </div>
    </div>`;
}

function bindSettings() {
  document.getElementById('profile-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('save-btn');
    btn.disabled = true; btn.textContent = '⏳ جاري الحفظ...';
    const updates = {
      full_name: document.getElementById('s-name').value,
      phone:     document.getElementById('s-phone').value,
      grade:     document.getElementById('s-grade').value,
    };
    const { error } = await sb.from('profiles').update(updates).eq('id', STATE.user.id);
    btn.disabled = false; btn.textContent = '💾 حفظ التغييرات';
    if (!error) { STATE.profile = { ...STATE.profile, ...updates }; updateHeaderUI(); }
    document.getElementById('save-msg').innerHTML = error
      ? `<div class="toast-err">❌ ${error.message}</div>`
      : `<div class="toast-ok">✅ تم حفظ بياناتك بنجاح</div>`;
  });

  document.getElementById('pw-form').addEventListener('submit', async e => {
    e.preventDefault();
    const nw  = document.getElementById('pw-new').value;
    const cf  = document.getElementById('pw-confirm').value;
    const msg = document.getElementById('pw-msg');
    if (nw.length < 8)  return (msg.innerHTML = '<div class="toast-err">❌ كلمة المرور يجب أن تكون 8 أحرف</div>');
    if (nw !== cf)      return (msg.innerHTML = '<div class="toast-err">❌ كلمتا المرور غير متطابقتين</div>');
    const btn = document.getElementById('pw-btn');
    btn.disabled = true; btn.textContent = '⏳ جاري التغيير...';
    const { error } = await sb.auth.updateUser({ password: nw });
    btn.disabled = false; btn.textContent = '🔒 تغيير كلمة المرور';
    msg.innerHTML = error
      ? `<div class="toast-err">❌ ${mapAuthErr(error.message)}</div>`
      : `<div class="toast-ok">✅ تم تغيير كلمة المرور بنجاح</div>`;
    if (!error) { document.getElementById('pw-new').value = ''; document.getElementById('pw-confirm').value = ''; }
  });
}

// ── SUPPORT ──────────────────────────────────────────────────────
function support() {
  return `

    <p class="page-sub">نحن هنا لمساعدتك في أي وقت</p>
    <div class="support-grid">
      <div class="support-card" onclick="window.open('https://wa.me/201012142749','_blank')">
        <div class="support-icon">💬</div><div style="font-size:.95rem;font-weight:700;color:var(--dark);margin-bottom:4px">واتساب</div>
        <div style="font-size:.8rem;color:var(--gray)">تواصل معنا مباشرة</div>
      </div>
      <div class="support-card">
        <div class="support-icon">📧</div><div style="font-size:.95rem;font-weight:700;color:var(--dark);margin-bottom:4px">البريد الإلكتروني</div>
        <div style="font-size:.8rem;color:var(--gray)">support@seleem-academy.com</div>
      </div>
      <div class="support-card">
        <div class="support-icon">📞</div><div style="font-size:.95rem;font-weight:700;color:var(--dark);margin-bottom:4px">الهاتف</div>
        <div style="font-size:.8rem;color:var(--gray)">+201012142749 · متاح طوال اليوم</div>
      </div>
    </div>
    <div class="section-card">
      <div class="section-head"><h3>ابعتلنا رسالة</h3></div>
      <div class="section-body">
        <div class="settings-group" style="margin-bottom:16px">
          <label>الموضوع</label>
          <input type="text" id="sup-subject" placeholder="موضوع رسالتك">
        </div>
        <div class="settings-group" style="margin-bottom:16px">
          <label>رسالتك</label>
          <textarea id="sup-msg" rows="4" placeholder="اكتب رسالتك هنا..."></textarea>

        <button class="btn-save" id="sup-btn" onclick="sendSupport()">✉️ إرسال الرسالة</button>
        <div id="sup-feedback"></div>

}

function bindSupport() {
  document.getElementById('sup-btn').addEventListener('click', () => {
    const s = document.getElementById('sup-subject').value.trim();
    const m = document.getElementById('sup-msg').value.trim();
    if (!s || !m) return;
    window.open(`https://wa.me/201012142749?text=${encodeURIComponent(`الموضوع: ${s}\n\n${m}`)}`, '_blank');
    document.getElementById('sup-subject').value = '';
    document.getElementById('sup-msg').value = '';
    document.getElementById('sup-feedback').innerHTML = '<div class="toast-ok">✅ تم فتح واتساب لإرسال رسالتك</div>';
    setTimeout(() => document.getElementById('sup-feedback').innerHTML = '', 4000);
  });
}

// ── SHARED RENDERERS ──────────────────────────────────────────────
function renderSessionItem(s) {
  const st   = sessionStatus(s);
  const ended = st === 'ended';
  const tbStyle = ended ? 'background:var(--gray-light);border-color:var(--gray-mid)' : '';
  const txStyle = ended ? 'color:var(--gray)' : '';
  let btn = '';
  if (st === 'live' && s.zoom_link)
    btn = `<button class="btn-join btn-live" onclick="window.open('${s.zoom_link}','_blank')">🎥 ادخل</button>`;
  else if (st === 'soon')     btn = `<button class="btn-join btn-soon" disabled>قريباً</button>`;
  else if (st === 'upcoming') btn = `<button class="btn-join btn-dis"  disabled>لم يبدأ</button>`;
  else                        btn = `<button class="btn-join btn-end"  disabled>انتهت</button>`;
  const cd = st === 'live' ? '<div class="countdown">🟢 الحصة تبدأ الآن!</div>'
           : st === 'soon' ? '<div class="countdown">⏳ ستبدأ قريباً</div>' : '';
  return `
    <div class="session-item">
      <div class="session-time-box" style="${tbStyle}">
        <div class="session-day"  style="${txStyle}">${dayLabel(s.scheduled_at)}</div>
        <div class="session-hour" style="${txStyle}">${formatTime(s.scheduled_at)}</div>
      </div>
      <div class="session-info">
        <div class="session-subj">${s.subject}</div>
        <div class="session-teacher">${s.teacher_name}</div>
        ${cd}
      </div>
      ${btn}
    </div>`;
}

function renderCourseItem(e) {
  const c = e.courses || {};
  const p = e.progress_pct || 0;
  return `
    <div class="course-item">
      <div class="course-thumb" style="background:${c.icon_bg||'#EBF5FF'}">${c.icon||'📚'}</div>
      <div class="course-info">
        <div class="course-name">${c.name||'—'}</div>
        <div class="course-meta">${c.teacher_name||''} · ${c.total_hours||0} ساعة</div>
        <div class="pw">
          <div class="pb"><div class="pf" style="width:${p}%;background:${pgGradient(p)}"></div></div>
          <div class="pp" style="color:${pgColor(p)}">${p}%</div>
        </div>
      </div>
      <button class="btn-continue">استكمال</button>
    </div>`;
}

// ══════════════════════════════════════════════════════════════════
// UPDATE UI HEADER
// ══════════════════════════════════════════════════════════════════
function updateHeaderUI() {
  const name  = STATE.profile?.full_name || STATE.user?.email?.split('@')[0] || 'طالب';
  const init  = initials(STATE.profile?.full_name || null);
  const grade = STATE.profile?.grade || 'الثانوية';
  const fname = name.split(' ')[0];

  document.getElementById('header-name').textContent   = fname;
  document.getElementById('header-uname').textContent  = name;
  document.getElementById('header-av').textContent     = init;
  document.getElementById('sidebar-initials').textContent = init;
  document.getElementById('sidebar-name').textContent  = name;
  document.getElementById('sidebar-grade').textContent = `طالب · ${grade}`;

  const unread = STATE.notifications.filter(n => !n.is_read).length;
  document.getElementById('notif-dot').style.display = unread > 0 ? 'block' : 'none';
}

// ══════════════════════════════════════════════════════════════════
// APP INIT — entry point
// ══════════════════════════════════════════════════════════════════
// ── HELPERS ──────────────────────────────────────────────────────
function showDashboard() {
  document.getElementById('loader').style.display           = 'none';
  document.getElementById('auth-screen').style.display      = 'none';
  document.getElementById('dashboard-screen').style.display = 'block';
}
function showAuth() {
  document.getElementById('loader').style.display           = 'none';
  document.getElementById('dashboard-screen').style.display = 'none';
  document.getElementById('auth-screen').style.display      = 'flex';
}
function showLoader() {
  document.getElementById('loader').style.display           = 'flex';
  document.getElementById('auth-screen').style.display      = 'none';
  document.getElementById('dashboard-screen').style.display = 'none';
}

// ── INIT ──────────────────────────────────────────────────────────
let _appReady = false; // هل الداشبورد اتحمل قبل كده؟

sb.auth.onAuthStateChange(async (event, session) => {
  // TOKEN_REFRESHED أو INITIAL_SESSION بعد ما الداشبورد اشتغل → تجاهل
  if (_appReady && event !== 'SIGNED_OUT') return;

  if (session?.user) {
    STATE.user = session.user;

    // لو الداشبورد اشتغل قبل كده، متعملش حاجة
    if (_appReady) return;

    showLoader();
    await fetchAllData(session.user.id);
    _appReady = true;
    showDashboard();
    updateHeaderUI();
    renderNav();
    renderPage();
  } else if (event === 'SIGNED_OUT') {
    _appReady = false;
    STATE.user = null;
    showAuth();
  }
});

// فحص أولي سريع لو مفيش session
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) showAuth();
})();
</script>
